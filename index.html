<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">

  <div class="max-w-2xl mx-auto px-6 py-12">

    <div class="mb-10">
      <h1 class="text-3xl font-bold text-white mb-1">Study Library</h1>
      <p class="text-gray-500 text-sm">Personal reading list — add files with <code class="text-indigo-400">./publish.sh file.html "Title"</code></p>
    </div>

    <!-- FILE LIST: entries are added below by publish.sh -->
    <div id="files" class="flex flex-col gap-3">
      <!-- ENTRIES_START -->
      <!-- ENTRIES_END -->
    </div>

    <p id="empty" class="text-gray-600 text-sm mt-4">No files yet. Drop an HTML file here and run <code class="text-indigo-400">./publish.sh</code>.</p>

  </div>

  <script>
    // Hide the empty message if there are entries
    const entries = document.querySelectorAll('#files a');
    if (entries.length > 0) document.getElementById('empty').style.display = 'none';
  </script>

</body>
</html>
